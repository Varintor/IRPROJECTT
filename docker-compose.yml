services:
  # 1. The PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: recipe_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: recipe_app
    ports:
      - "5432:5432"
    volumes:
      # Change 1: Use a new volume name here
      - pgdata_new:/var/lib/postgresql/data

  # 2. pgAdmin to view the database
  pgadmin:
    image: dpage/pgadmin4
    container_name: recipe_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.4
    container_name: recipe_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  pgdata_new:
  es_data: